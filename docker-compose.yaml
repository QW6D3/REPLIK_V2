services:
  front:
    build: ./client
    depends_on:
      - back
    volumes:
      - ./client:/app
      - /app/node_modules

  back:
    env_file:
      - .env
    build: ./server
    depends_on:
      - mongo
    volumes:
      - ./server:/app

  mongo:
    image: mongo
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
  nginx:
    image: nginx
    depends_on:
      - front
      - back
      - mongo
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

volumes:
  mongo_data:
